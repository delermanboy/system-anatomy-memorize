    sprintCorrect: 0,
    sprintTotal: 0
  };

  // ===== INIT =====
  function init() {
    buildFilters();
    renderAll();
    updateStats();
    window.addEventListener('scroll', function() {
      var btn = document.getElementById('scrollTopBtn');
      if (window.scrollY > 300) btn.classList.add('show');
      else btn.classList.remove('show');
    });
  }

  // ===== TABS =====
  window.switchTab = function(tab) {
    state.currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    document.querySelectorAll('.tab-panel').forEach(function(p) {
      p.classList.toggle('active', p.id === 'panel-' + tab);
    });
  };

  // ===== FILTERS =====
  function buildFilters() {
    var cats = {};
    APP_DATA.fillBlanks.forEach(function(item) { cats[item.category] = true; });
    var essayCats = {};
    APP_DATA.essayQuestions.forEach(function(item) { essayCats[item.category] = true; });
    var sprintCats = {};
    APP_DATA.keyPoints.forEach(function(item) { sprintCats[item.category] = true; });

    renderFilterBar('fillFilter', Object.keys(cats), state.fillCategory, function(c) {
      state.fillCategory = c;
      renderFillList();
    });
    renderFilterBar('essayFilter', Object.keys(essayCats), state.essayCategory, function(c) {
      state.essayCategory = c;
      renderEssayList();
    });
    renderFilterBar('sprintFilter', Object.keys(sprintCats), state.sprintCategory, function(c) {
      state.sprintCategory = c;
      renderSprintList();
    });
  }

  function renderFilterBar(containerId, categories, active, onClick) {
    var el = document.getElementById(containerId);
    var html = '<span class="filter-label">章节：</span>';
    html += '<button class="filter-chip ' + (active === 'all' ? 'active' : '') + '" data-cat="all">全部</button>';
    categories.forEach(function(c) {
      html += '<button class="filter-chip ' + (active === c ? 'active' : '') + '" data-cat="' + c + '">' + c + '</button>';
    });
    el.innerHTML = html;
    el.querySelectorAll('.filter-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        el.querySelectorAll('.filter-chip').forEach(function(ch) { ch.classList.remove('active'); });
        chip.classList.add('active');
        onClick(chip.dataset.cat);
      });
    });
  }

  // ===== FILL BLANKS =====
  window.setFillMode = function(mode) {
    state.fillMode = mode;
    document.querySelectorAll('#panel-fill .mode-btn').forEach(function(b) {
      b.classList.toggle('active', b.textContent.indexOf(mode === 'click' ? '点击' : '输入') >= 0);
    });
    renderFillList();
  };

  function renderFillList() {
    var items = APP_DATA.fillBlanks.filter(function(item) {
      return state.fillCategory === 'all' || item.category === state.fillCategory;
    });
    var container = document.getElementById('fillList');
    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无内容</div></div>';
      return;
    }
    var html = '';
    items.forEach(function(item) {
      var revealed = state.fillRevealed[item.id] || new Set();
      var allRevealed = item.blanks.every(function(_, i) { return revealed.has(i); });
      html += '<div class="card" id="fill-' + item.id + '">';
      html += '<div class="card-header">';
      html += '<span class="card-category">' + item.category + '</span>';
      html += '<span class="card-id">#' + item.id + '</span>';
      html += '</div>';
      html += '<div class="blank-text">';
      if (state.fillMode === 'click') {
        var text = item.text;
        item.blanks.forEach(function(blank, i) {
          text = text.replace(blank, function() {
            var cls = 'blank-slot';
            if (revealed.has(i)) cls += ' revealed';
            return '<span class="' + cls + '" data-id="' + item.id + '" data-idx="' + i + '" onclick="toggleBlank(this)">' + blank + '</span>';
          });
        });
        html += text;
      } else {
        // input mode
        var text2 = item.text;
        item.blanks.forEach(function(blank, i) {
          text2 = text2.replace(blank, function() {
            var cls = 'blank-slot';
            if (revealed.has(i)) cls += ' revealed';
            return '<span class="' + cls + '" data-id="' + item.id + '" data-idx="' + i + '">' + (revealed.has(i) ? blank : '______') + '</span>';
          });
        });
        html += text2;
      }
      html += '</div>';
      html += '<div class="card-actions">';
      html += '<button class="btn btn-primary" onclick="revealAllBlanks(\'' + item.id + '\')">揭示全部</button>';
      html += '<button class="btn btn-danger" onclick="resetBlanks(\'' + item.id + '\')">重新隐藏</button>';
      if (state.fillMode === 'input' && !allRevealed) {
        html += '<button class="btn" onclick="checkBlankInput(\'' + item.id + '\')">检查答案</button>';
      }
      html += '</div>';
      if (state.fillMode === 'input' && !allRevealed) {
        html += '<div class="card-actions" style="margin-top:0.5rem">';
        item.blanks.forEach(function(blank, i) {
          if (!revealed.has(i)) {
            html += '<input class="sprint-input" placeholder="填空 ' + (i+1) + '" data-fill-id="' + item.id + '" data-fill-idx="' + i + '" style="max-width:180px">';
          }
        });
        html += '</div>';
      }
      html += '</div>';
    });
    container.innerHTML = html;
    updateFillProgress();
  }

  window.toggleBlank = function(el) {
    var id = el.dataset.id;
    var idx = parseInt(el.dataset.idx);
    if (!state.fillRevealed[id]) state.fillRevealed[id] = new Set();
    if (state.fillRevealed[id].has(idx)) {
      state.fillRevealed[id].delete(idx);
      el.classList.remove('revealed');
    } else {
      state.fillRevealed[id].add(idx);
      el.classList.add('revealed');
    }
    updateFillProgress();
  };

  window.revealAllBlanks = function(id) {
    if (!state.fillRevealed[id]) state.fillRevealed[id] = new Set();
    var item = APP_DATA.fillBlanks.find(function(f) { return f.id === id; });
    if (item) {
      item.blanks.forEach(function(_, i) { state.fillRevealed[id].add(i); });
      renderFillList();
    }
  };

  window.resetBlanks = function(id) {
    state.fillRevealed[id] = new Set();
    renderFillList();
  };

  window.checkBlankInput = function(id) {
    var item = APP_DATA.fillBlanks.find(function(f) { return f.id === id; });
    if (!item) return;
    var inputs = document.querySelectorAll('input[data-fill-id="' + id + '"]');
    var allCorrect = true;
    inputs.forEach(function(input) {
      var idx = parseInt(input.dataset.fillIdx);
      var answer = item.blanks[idx];
      var userVal = input.value.trim();
      if (userVal === answer || answer.indexOf(userVal) >= 0 || userVal.indexOf(answer) >= 0) {
        input.classList.add('correct');
        input.classList.remove('wrong');
        if (!state.fillRevealed[id]) state.fillRevealed[id] = new Set();
        state.fillRevealed[id].add(idx);
      } else {
        input.classList.add('wrong');
        input.classList.remove('correct');
        allCorrect = false;
      }
    });
    if (allCorrect) {
      showToast('全部正确！太棒了！');
    } else {
      showToast('部分答案有误，已标红显示');
    }
    renderFillList();
  };

  window.randomFill = function() {
    var items = APP_DATA.fillBlanks.filter(function(item) {
      return state.fillCategory === 'all' || item.category === state.fillCategory;
    });
    if (items.length === 0) return;
    var item = items[Math.floor(Math.random() * items.length)];
    state.fillRevealed[item.id] = new Set();
    renderFillList();
    var el = document.getElementById('fill-' + item.id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  function updateFillProgress() {
    var total = APP_DATA.fillBlanks.length;
    var done = 0;
    APP_DATA.fillBlanks.forEach(function(item) {
      var revealed = state.fillRevealed[item.id];
      if (revealed && item.blanks.every(function(_, i) { return revealed.has(i); })) done++;
    });
    var pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('fillProgress').style.width = pct + '%';
    document.getElementById('fillProgressText').textContent = done + ' / ' + total;
  }

  // ===== ESSAY QUESTIONS =====
  window.setEssayType = function(type) {
    state.essayType = type;
    document.querySelectorAll('#panel-essay .mode-btn').forEach(function(b) {
      b.classList.toggle('active', b.textContent.indexOf(type === 'all' ? '全部' : type) >= 0);
    });
    renderEssayList();
  };

  function renderEssayList() {
    var items = APP_DATA.essayQuestions.filter(function(item) {
      var catMatch = state.essayCategory === 'all' || item.category === state.essayCategory;
      var typeMatch = state.essayType === 'all' || item.type === state.essayType;
      return catMatch && typeMatch;
    });
    var container = document.getElementById('essayList');
    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无内容</div></div>';
      return;
    }
    var html = '';
    items.forEach(function(item) {
      var revealed = state.essayRevealed[item.id] || false;
      var badgeClass = item.type === '简答题' ? 'badge-simple' : (item.type === '论述题' ? 'badge-essay' : 'badge-case');
      html += '<div class="card" id="essay-' + item.id + '">';
      html += '<div class="card-header">';
      html += '<div style="display:flex;gap:0.5rem;align-items:center">';
      html += '<span class="card-category">' + item.category + '</span>';
      html += '<span class="question-type-badge ' + badgeClass + '">' + item.type + '</span>';
      html += '</div>';
      html += '<span class="card-id">#' + item.id + '</span>';
      html += '</div>';
      html += '<div class="question-text">' + item.question + '</div>';
      html += '<div class="answer-section ' + (revealed ? 'show' : '') + '" id="answer-' + item.id + '">';
      html += '<div class="answer-content">' + formatAnswer(item.answer) + '</div>';
      html += '</div>';
      html += '<button class="show-answer-btn ' + (revealed ? 'revealed' : '') + '" onclick="toggleEssay(\'' + item.id + '\')">';
      html += revealed ? '🔒 隐藏答案（再次背诵）' : '👁 显示答案';
      html += '</button>';
      html += '</div>';
    });
    container.innerHTML = html;
    updateEssayProgress();
  }

  window.toggleEssay = function(id) {
    state.essayRevealed[id] = !state.essayRevealed[id];
    var section = document.getElementById('answer-' + id);
    var btn = section ? section.parentElement.querySelector('.show-answer-btn') : null;
    if (section) {
      section.classList.toggle('show', state.essayRevealed[id]);
    }
    if (btn) {
      btn.classList.toggle('revealed', state.essayRevealed[id]);
      btn.textContent = state.essayRevealed[id] ? '🔒 隐藏答案（再次背诵）' : '👁 显示答案';
    }
    updateEssayProgress();
  };

  window.randomEssay = function() {
    var items = APP_DATA.essayQuestions.filter(function(item) {
      var catMatch = state.essayCategory === 'all' || item.category === state.essayCategory;
      var typeMatch = state.essayType === 'all' || item.type === state.essayType;
      return catMatch && typeMatch;
    });
    if (items.length === 0) return;
    var item = items[Math.floor(Math.random() * items.length)];
    state.essayRevealed[item.id] = false;
    renderEssayList();
    var el = document.getElementById('essay-' + item.id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  function formatAnswer(answer) {
    // Convert markdown-like formatting to HTML
    var html = answer;
    // Bold **text**
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Numbered lists: ①②③ or 1. 2. 3.
    html = html.replace(/([①②③④⑤⑥⑦⑧⑨⑩])/g, '<br>$1');
    // Newlines
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function updateEssayProgress() {
    var total = APP_DATA.essayQuestions.length;
    var done = Object.keys(state.essayRevealed).filter(function(k) { return state.essayRevealed[k]; }).length;
    var pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('essayProgress').style.width = pct + '%';
    document.getElementById('essayProgressText').textContent = done + ' / ' + total;
  }

  // ===== SPRINT MODE =====
  window.setSprintMode = function(mode) {
    state.sprintMode = mode;
    document.querySelectorAll('#panel-sprint .mode-btn').forEach(function(b) {
      var txt = b.textContent;
      var match = mode === 'all' ? txt.indexOf('全部') >= 0
                : mode === 'unmastered' ? txt.indexOf('未掌握') >= 0
                : mode === 'important' ? txt.indexOf('高频') >= 0
                : false;
      b.classList.toggle('active', match);
    });
    renderSprintList();
  };

  function renderSprintList(skipShuffle) {
    var items = APP_DATA.keyPoints.filter(function(item) {
      var catMatch = state.sprintCategory === 'all' || item.category === state.sprintCategory;
      if (state.sprintMode === 'unmastered') return catMatch && !state.sprintMastered[item.id];
      if (state.sprintMode === 'important') return catMatch && item.importance >= 3;
      return catMatch;
    });
    // Shuffle only on initial render, not when just marking mastered
    if (!skipShuffle) {
      items = shuffleArray(items);
    }
    var container = document.getElementById('sprintList');
    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">全部掌握！太厉害了！</div></div>';
      return;
    }
    var html = '';
    items.forEach(function(item) {
      var mastered = state.sprintMastered[item.id];
      html += '<div class="sprint-card level-' + item.importance + (mastered ? ' mastered' : '') + '" id="sprint-' + item.id + '">';
      html += '<div class="sprint-point">' + highlightKeywords(item.point) + '</div>';
      html += '<div class="sprint-meta">';
      html += '<span class="importance-stars">';
      for (var i = 0; i < 3; i++) {
        html += '<span class="star ' + (i < item.importance ? '' : 'empty') + '">★</span>';
      }
      html += '</span>';
      html += '<span class="sprint-category">' + item.category + '</span>';
      html += '</div>';
      if (!mastered) {
        html += '<div class="sprint-actions">';
        html += '<input class="sprint-input" placeholder="默念后点击「已掌握」" id="sprint-input-' + item.id + '">';
        html += '<button class="btn btn-primary btn-sm" onclick="markSprintMastered(\'' + item.id + '\')">已掌握</button>';
        html += '<button class="btn btn-sm" onclick="peekSprint(\'' + item.id + '\')">提示</button>';
      } else {
        html += '<div class="sprint-actions">';
        html += '<button class="btn btn-sm" onclick="unmarkSprintMastered(\'' + item.id + '\')">重新练习</button>';
        html += '</div>';
      }
      html += '</div>';
    });
    container.innerHTML = html;
    updateSprintStats();
  }

  window.markSprintMastered = function(id) {
    if (state.sprintMastered[id]) return; // 防止重复计数
    state.sprintMastered[id] = true;
    state.sprintCorrect++;
    state.sprintTotal++;
    showToast('✅ 已标记为掌握！');
    renderSprintList(true); // 不重新打乱
    updateStats();
  };

  window.unmarkSprintMastered = function(id) {
    if (!state.sprintMastered[id]) return;
    delete state.sprintMastered[id];
    state.sprintCorrect = Math.max(0, state.sprintCorrect - 1);
    state.sprintTotal = Math.max(0, state.sprintTotal - 1);
    renderSprintList(true);
    updateStats();
  };

  window.peekSprint = function(id) {
    var item = APP_DATA.keyPoints.find(function(k) { return k.id === id; });
    if (!item) return;
    var input = document.getElementById('sprint-input-' + id);
    if (input) {
      input.value = item.point;
      input.classList.add('correct');
    }
  };

  window.randomSprint = function() {
    var items = APP_DATA.keyPoints.filter(function(item) {
      var catMatch = state.sprintCategory === 'all' || item.category === state.sprintCategory;
      if (state.sprintMode === 'unmastered') return catMatch && !state.sprintMastered[item.id];
      if (state.sprintMode === 'important') return catMatch && item.importance >= 3;
      return catMatch;
    });
    if (items.length === 0) return;
    var item = items[Math.floor(Math.random() * items.length)];
    var el = document.getElementById('sprint-' + item.id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      // 闪烁效果提示
      el.style.transition = 'box-shadow 0.3s';
      el.style.boxShadow = '0 0 20px rgba(0,212,170,0.3)';
      setTimeout(function() { el.style.boxShadow = 'none'; }, 1500);
    }
  };

  function highlightKeywords(text) {
    // Highlight key anatomical terms - escape HTML first, then mark keywords
    var html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    var keywords = ['动脉','静脉','神经','肌肉','骨','关节','韧带','腱','膜','核','束','窦','管','孔','裂','角','弓','窝','沟','隆凸','三角','峡','盘','瓣','囊','室','房','网','丛','缘','面','头','颈','体','底','尖','门','蒂','裂孔','隐窝','交叉','乳头','切迹','隆起','膨大','凹陷','狭窄','膨隆','扁桃体','圆锥','动脉环','传导束','纤维束','神经核','神经节','感受器','中枢'];
    // Sort by length (longest first) to avoid partial highlights
    keywords.sort(function(a, b) { return b.length - a.length; });
    keywords.forEach(function(kw) {
      var regex = new RegExp('(' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g');
      html = html.replace(regex, '<mark class="hl">$1</mark>');
    });
    // Clean up nested marks (e.g. <mark class="hl">大脑<mark class="hl">动脉</mark>环</mark> -> just show the outer)
    while (html.indexOf('<mark class="hl"><mark class="hl">') >= 0) {
      html = html.replace(/<mark class="hl"><mark class="hl">/g, '<mark class="hl">');
      html = html.replace(/<\/mark><\/mark>/g, '</mark>');
    }
    return html;
  }

  function updateSprintStats() {
    var mastered = Object.keys(state.sprintMastered).length;
    var total = APP_DATA.keyPoints.length;
    document.getElementById('sprintCorrect').textContent = mastered;
    document.getElementById('sprintTotal').textContent = state.sprintTotal;
    document.getElementById('sprintRemain').textContent = total - mastered;
  }

  // ===== UTILS =====
  function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
  }

  function updateStats() {
    var fillDone = 0;
    APP_DATA.fillBlanks.forEach(function(item) {
      var revealed = state.fillRevealed[item.id];
      if (revealed && item.blanks.every(function(_, i) { return revealed.has(i); })) fillDone++;
    });
    document.getElementById('statFill').textContent = fillDone;
    document.getElementById('statEssay').textContent = APP_DATA.essayQuestions.length;
    var mastered = Object.keys(state.sprintMastered).length;
    document.getElementById('statKey').textContent = mastered;
  }

  function renderAll() {
    renderFillList();
    renderEssayList();
    renderSprintList();
  }

  // ===== START =====
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
