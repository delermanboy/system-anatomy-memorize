<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统解剖学 · 期末背书神器</title>
<style>
/* ===== FONTS ===== */
@font-face {
  font-family: 'ArsenalSC';
  src: url('./_shared/fonts/ArsenalSC-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Outfit';
  src: url('./_shared/fonts/Outfit-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Outfit';
  src: url('./_shared/fonts/Outfit-Bold.ttf') format('truetype');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

/* ===== CSS VARIABLES (古风配色) ===== */
:root {
  --bg: #f5f0e8;
  --bg2: #ede5d8;
  --bg3: #e0d5c5;
  --ink: #2c1810;
  --muted: #8a7560;
  --accent: #c41e3a;
  --accent2: #2d6a4f;
  --accent3: #b8860b;
  --rule: #d4c5b0;
  --success: #2d6a4f;
  --warning: #b8860b;
  --danger: #c41e3a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'ArsenalSC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 古风装饰：回纹边框 ===== */
.scroll-border {
  position: relative;
  border: 2px double var(--rule);
  border-radius: 8px;
  background: var(--bg2);
}
.scroll-border::before,
.scroll-border::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border: 2px solid var(--accent3);
  opacity: 0.5;
}
.scroll-border::before {
  top: -1px; left: -1px;
  border-right: none; border-bottom: none;
  border-radius: 8px 0 0 0;
}
.scroll-border::after {
  bottom: -1px; right: -1px;
  border-left: none; border-top: none;
  border-radius: 0 0 8px 0;
}

/* ===== HEADER ===== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(245, 240, 232, 0.95);
  backdrop-filter: blur(16px);
  border-bottom: 2px double var(--rule);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.app-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #a01830);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #fff;
  font-weight: bold;
  border: 1px solid var(--accent3);
}
.app-logo-text {
  font-family: 'Outfit', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.app-logo-sub {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: -2px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.header-stats {
  display: flex;
  gap: 1.25rem;
  align-items: center;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Outfit', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
}
.stat-label {
  font-size: 0.65rem;
  color: var(--muted);
}

/* ===== 搜索按钮和搜索框 ===== */
.search-toggle {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg2);
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.search-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.search-wrap {
  position: relative;
  display: none;
}
.search-wrap.open { display: block; }
.search-input {
  width: 220px;
  padding: 0.4rem 0.7rem;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg);
  color: var(--ink);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-results {
  position: absolute;
  top: 100%;
  right: 0;
  width: 360px;
  max-height: 400px;
  overflow-y: auto;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(44,24,16,0.15);
  z-index: 200;
  display: none;
  margin-top: 4px;
}
.search-results.open { display: block; }
.search-result-item {
  padding: 0.6rem 0.8rem;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  font-size: 0.82rem;
  line-height: 1.5;
  transition: background 0.15s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--bg3); }
.search-result-type {
  font-size: 0.65rem;
  padding: 0.1rem 0.4rem;
  border-radius: 4px;
  font-weight: bold;
  margin-right: 0.4rem;
  display: inline-block;
}
.sr-type-fill { background: rgba(196,30,58,0.12); color: var(--accent); }
.sr-type-essay { background: rgba(184,134,11,0.12); color: var(--accent3); }
.sr-type-key { background: rgba(45,106,79,0.12); color: var(--accent2); }
.search-result-text { color: var(--ink); }
.search-result-text mark {
  background: rgba(196,30,58,0.2);
  color: var(--accent);
  padding: 0 1px;
  border-radius: 2px;
}
.search-empty {
  padding: 1.5rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
}

/* ===== TAB NAV ===== */
.tab-nav {
  display: flex;
  gap: 0;
  background: var(--bg2);
  border-bottom: 2px double var(--rule);
  padding: 0 1rem;
  overflow-x: auto;
}
.tab-btn {
  flex: 1;
  min-width: 100px;
  padding: 0.85rem 1rem;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active {
  color: var(--accent);
  font-weight: bold;
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 10%;
  width: 80%;
  height: 2.5px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-icon {
  margin-right: 0.4rem;
  font-size: 1rem;
}

/* ===== MAIN CONTENT ===== */
.main-content {
  max-width: 860px;
  margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
  align-items: center;
}
.filter-label {
  font-size: 0.8rem;
  color: var(--muted);
  margin-right: 0.25rem;
}
.filter-chip {
  padding: 0.35rem 0.75rem;
  border-radius: 20px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--muted);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-chip:hover {
  border-color: var(--accent);
  color: var(--ink);
}
.filter-chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: bold;
}
.progress-bar-wrap {
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #e03050);
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
}

/* ===== CARD (古风卷轴) ===== */
.card {
  background: var(--bg2);
  border: 2px double var(--rule);
  border-radius: 8px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  transition: all 0.2s;
  position: relative;
}
.card::before,
.card::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border: 2px solid var(--accent3);
  opacity: 0.35;
}
.card::before {
  top: -1px; left: -1px;
  border-right: none; border-bottom: none;
  border-radius: 8px 0 0 0;
}
.card::after {
  bottom: -1px; right: -1px;
  border-left: none; border-top: none;
  border-radius: 0 0 8px 0;
}
.card:hover {
  border-color: var(--accent3);
  background: #f0e8d8;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}
.card-category {
  font-size: 0.7rem;
  color: var(--accent);
  background: rgba(196,30,58,0.1);
  padding: 0.2rem 0.6rem;
  border-radius: 10px;
  font-weight: bold;
}
.card-id {
  font-size: 0.7rem;
  color: var(--muted);
}
/* 背诵次数徽章 */
.mem-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 0.65rem;
  padding: 0.15rem 0.45rem;
  border-radius: 10px;
  background: rgba(45,106,79,0.12);
  color: var(--accent2);
  font-weight: bold;
  margin-left: 0.4rem;
}

/* ===== FAVORITES ===== */
.fav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  padding: 0.2rem;
  line-height: 1;
  opacity: 0.4;
  transition: all 0.2s;
  margin-left: 0.3rem;
}
.fav-btn:hover { opacity: 0.7; transform: scale(1.2); }
.fav-btn.active { opacity: 1; }
.fav-btn.active .fav-icon { color: var(--accent3); }
.filter-fav {
  background: rgba(184,134,11,0.15);
  color: var(--accent3);
  border: 1px solid var(--accent3);
}
.filter-fav.active {
  background: var(--accent3);
  color: #fff;
}

/* ===== CORRECTIONS ===== */
.corr-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0.15rem 0.3rem;
  line-height: 1;
  opacity: 0.35;
  transition: all 0.2s;
  margin-left: 0.2rem;
}
.corr-btn:hover { opacity: 0.8; transform: scale(1.15); }
.corr-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 0.6rem;
  padding: 0.1rem 0.35rem;
  border-radius: 8px;
  background: rgba(196,30,58,0.15);
  color: var(--accent);
  font-weight: bold;
  margin-left: 0.3rem;
}
.corr-reset-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--muted);
  opacity: 0.5;
  transition: all 0.2s;
  margin-left: 0.2rem;
}
.corr-reset-btn:hover { opacity: 1; color: var(--accent); }

/* ===== SYLLABUS ===== */
.syllabus-header {
  margin-bottom: 1rem;
}
.syllabus-filter {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}
.syllabus-filter .filter-chip.active[data-level="掌握"] { background: var(--accent); color: #fff; }
.syllabus-filter .filter-chip.active[data-level="熟悉"] { background: var(--accent3); color: #fff; }
.syllabus-filter .filter-chip.active[data-level="了解"] { background: var(--muted); color: #fff; }
.syllabus-progress {
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}
.syllabus-chapter {
  margin-bottom: 1.5rem;
}
.syllabus-chapter-title {
  font-size: 1rem;
  font-weight: bold;
  color: var(--ink);
  padding: 0.5rem 0.75rem;
  background: var(--bg2);
  border-left: 4px solid var(--accent);
  border-radius: 0 8px 8px 0;
  margin-bottom: 0.5rem;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.syllabus-chapter-title:hover { background: var(--bg3); }
.syllabus-chapter-arrow {
  transition: transform 0.2s;
  font-size: 0.8rem;
  color: var(--muted);
}
.syllabus-chapter-arrow.open { transform: rotate(90deg); }
.syllabus-section {
  margin-bottom: 0.75rem;
}
.syllabus-section-title {
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--accent2);
  padding: 0.3rem 0.75rem;
  border-left: 3px solid var(--accent2);
  margin-bottom: 0.3rem;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.syllabus-section-title:hover { background: rgba(45,106,79,0.05); }
.syllabus-points {
  padding-left: 1.2rem;
}
.syllabus-point {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding: 0.35rem 0.5rem;
  border-radius: 6px;
  font-size: 0.85rem;
  line-height: 1.6;
  transition: background 0.15s;
  cursor: pointer;
}
.syllabus-point:hover { background: var(--bg2); }
.syllabus-point.checked { background: rgba(45,106,79,0.08); }
.syllabus-point.checked .syllabus-point-text { text-decoration: line-through; opacity: 0.6; }
.syllabus-level {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.2rem;
  padding: 0.1rem 0.3rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: bold;
  flex-shrink: 0;
  margin-top: 0.15rem;
}
.syllabus-level.master { background: rgba(196,30,58,0.15); color: var(--accent); }
.syllabus-level.familiar { background: rgba(184,134,11,0.15); color: var(--accent3); }
.syllabus-level.understand { background: rgba(138,117,96,0.15); color: var(--muted); }
.syllabus-point-text { flex: 1; }
.syllabus-check {
  width: 1rem;
  height: 1rem;
  border: 2px solid var(--rule);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 0.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: transparent;
  transition: all 0.15s;
}
.syllabus-point.checked .syllabus-check {
  border-color: var(--accent2);
  background: var(--accent2);
  color: #fff;
}
.syllabus-point-main {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding: 0.35rem 0.5rem;
  border-radius: 6px;
  transition: background 0.15s;
}
.syllabus-point-main:hover { background: var(--bg2); }
.syllabus-refs {
  padding: 0.2rem 0.5rem 0.4rem 2.2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  align-items: center;
}
.syllabus-refs-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin-right: 0.2rem;
}
.syllabus-ref-tag {
  display: inline-flex;
  align-items: center;
  padding: 0.1rem 0.4rem;
  border-radius: 6px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--rule);
  color: var(--ink);
  background: var(--bg2);
}
.syllabus-ref-tag:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.syllabus-ref-card {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 8px;
  margin-bottom: 0.3rem;
  overflow: hidden;
}
.syllabus-ref-header {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.5rem;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 0.8rem;
}
.syllabus-ref-header:hover { background: var(--bg2); }
.syllabus-ref-type {
  display: inline-flex;
  align-items: center;
  padding: 0.05rem 0.3rem;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: bold;
  flex-shrink: 0;
  background: rgba(196,30,58,0.12);
  color: var(--accent);
}
.syllabus-ref-preview {
  flex: 1;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.syllabus-ref-arrow {
  font-size: 0.7rem;
  color: var(--muted);
  flex-shrink: 0;
}
.syllabus-ref-body {
  padding: 0.5rem 0.6rem;
  border-top: 1px solid var(--rule);
  font-size: 0.82rem;
  line-height: 1.7;
  color: var(--ink);
}
.ref-content-text { margin-bottom: 0.3rem; }
.ref-content-answer {
  background: rgba(45,106,79,0.06);
  padding: 0.4rem 0.5rem;
  border-radius: 6px;
  margin-top: 0.3rem;
}
.ref-blank {
  color: var(--accent);
  font-weight: bold;
  border-bottom: 1px dashed var(--accent);
}
@keyframes highlightPulse {
  0% { box-shadow: 0 0 0 0 rgba(196,30,58,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(196,30,58,0); }
  100% { box-shadow: 0 0 0 0 rgba(196,30,58,0); }
}
.highlight {
  animation: highlightPulse 2s ease-out;
}
.corr-modal-box textarea {
  width: 100%;
  min-height: 120px;
  padding: 0.6rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg);
  color: var(--ink);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.9rem;
  line-height: 1.6;
  outline: none;
  resize: vertical;
  margin-bottom: 0.5rem;
}
.corr-modal-box textarea:focus { border-color: var(--accent); }
.corr-modal-box label {
  display: block;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 0.3rem;
}

/* ===== FILL BLANKS ===== */
.blank-text {
  font-size: 0.95rem;
  line-height: 2;
  color: var(--ink);
}
.blank-slot {
  display: inline-block;
  min-width: 60px;
  border-bottom: 2px dashed var(--accent);
  color: transparent;
  cursor: pointer;
  padding: 0 4px;
  margin: 0 2px;
  transition: all 0.3s;
  position: relative;
  user-select: none;
  border-radius: 4px;
}
.blank-slot:hover {
  background: rgba(196,30,58,0.06);
}
.blank-slot.revealed {
  color: var(--accent);
  border-bottom-style: solid;
  border-bottom-color: var(--accent);
  background: rgba(196,30,58,0.08);
  font-weight: bold;
}
.blank-slot.wrong {
  color: var(--danger);
  border-bottom-color: var(--danger);
  background: rgba(196,30,58,0.08);
}
.card-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.75rem;
  flex-wrap: wrap;
}

/* ===== BUTTONS (古风) ===== */
.btn {
  padding: 0.45rem 0.9rem;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg3);
  color: var(--ink);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover {
  border-color: var(--accent3);
  background: var(--bg2);
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: bold;
}
.btn-primary:hover {
  background: #a01830;
}
.btn-secondary {
  background: var(--accent2);
  color: #fff;
  border-color: var(--accent2);
  font-weight: bold;
}
.btn-secondary:hover {
  background: #1e5a3f;
}
.btn-danger {
  border-color: var(--danger);
  color: var(--danger);
}
.btn-danger:hover {
  background: rgba(196,30,58,0.08);
}
.btn-sm {
  padding: 0.3rem 0.6rem;
  font-size: 0.72rem;
}

/* ===== ESSAY QUESTIONS ===== */
.question-type-badge {
  font-size: 0.65rem;
  padding: 0.15rem 0.5rem;
  border-radius: 8px;
  font-weight: bold;
}
.badge-simple {
  background: rgba(45,106,79,0.15);
  color: var(--accent2);
}
.badge-essay {
  background: rgba(184,134,11,0.15);
  color: var(--accent3);
}
.badge-case {
  background: rgba(196,30,58,0.15);
  color: var(--accent);
}
.question-text {
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 0.75rem;
  color: var(--ink);
}
.answer-section {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
}
.answer-section.show { max-height: 3000px; }
.answer-content {
  padding-top: 0.75rem;
  border-top: 1px solid var(--rule);
  font-size: 0.88rem;
  line-height: 1.8;
  color: #5a4a38;
}
.answer-content strong { color: var(--accent); }
.answer-content p { margin-bottom: 0.4rem; }
.show-answer-btn {
  width: 100%;
  padding: 0.6rem;
  border: 1px dashed var(--rule);
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 0.5rem;
}
.show-answer-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(196,30,58,0.03);
}
.show-answer-btn.revealed {
  border-style: solid;
  border-color: var(--accent3);
  color: var(--accent3);
  background: rgba(184,134,11,0.05);
}

/* ===== SPRINT MODE ===== */
.sprint-card {
  background: var(--bg2);
  border: 2px double var(--rule);
  border-radius: 8px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.sprint-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 3px;
  height: 100%;
  border-radius: 3px 0 0 3px;
}
.sprint-card.level-3::before { background: var(--danger); }
.sprint-card.level-2::before { background: var(--accent3); }
.sprint-card.level-1::before { background: var(--accent2); }
.sprint-card:hover {
  border-color: var(--accent3);
  background: #f0e8d8;
  transform: translateY(-1px);
}
.sprint-card.mastered {
  opacity: 0.5;
  border-color: var(--rule);
}
.sprint-card.mastered::after {
  content: '已掌握';
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  font-size: 0.7rem;
  color: var(--accent2);
  background: rgba(45,106,79,0.1);
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
}
.sprint-point {
  font-size: 0.92rem;
  line-height: 1.7;
  color: var(--ink);
}
.sprint-point .hl {
  color: var(--accent);
  font-weight: bold;
}
.sprint-meta {
  display: flex;
  gap: 0.75rem;
  margin-top: 0.5rem;
  align-items: center;
}
.importance-stars { font-size: 0.75rem; }
.star { color: var(--accent3); }
.star.empty { color: var(--rule); }
.sprint-category {
  font-size: 0.7rem;
  color: var(--muted);
}
.sprint-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.75rem;
}
.sprint-input {
  flex: 1;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg);
  color: var(--ink);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.sprint-input:focus { border-color: var(--accent); }
.sprint-input.correct {
  border-color: var(--success);
  background: rgba(45,106,79,0.05);
}
.sprint-input.wrong {
  border-color: var(--danger);
  background: rgba(196,30,58,0.05);
}

/* ===== SPRINT HEADER ===== */
.sprint-header {
  text-align: center;
  padding: 2rem 1rem;
  margin-bottom: 1.5rem;
  background: linear-gradient(135deg, rgba(196,30,58,0.06), rgba(184,134,11,0.05));
  border-radius: 12px;
  border: 2px double var(--rule);
}
.sprint-title {
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--ink);
}
.sprint-desc {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1rem;
}
.sprint-stats {
  display: flex;
  justify-content: center;
  gap: 2rem;
}
.sprint-stat { text-align: center; }
.sprint-stat-num {
  font-family: 'Outfit', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
}
.sprint-stat-num.green { color: var(--accent2); }
.sprint-stat-num.yellow { color: var(--accent3); }
.sprint-stat-num.red { color: var(--accent); }
.sprint-stat-label {
  font-size: 0.72rem;
  color: var(--muted);
}

/* ===== MODE TOGGLE ===== */
.mode-toggle {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
  align-items: center;
}
.mode-btn {
  padding: 0.4rem 0.8rem;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--muted);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active {
  background: var(--bg3);
  color: var(--ink);
  border-color: var(--accent);
  font-weight: bold;
}

/* ===== RANDOM BUTTON ===== */
.random-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  border-radius: 10px;
  border: 1px solid var(--accent);
  background: rgba(196,30,58,0.06);
  color: var(--accent);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1rem;
}
.random-btn:hover {
  background: rgba(196,30,58,0.12);
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}
.empty-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}
.empty-text { font-size: 0.9rem; }

/* ===== SCROLL TOP ===== */
.scroll-top {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: 1px solid var(--accent3);
  cursor: pointer;
  font-size: 1.2rem;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(196,30,58,0.3);
  transition: all 0.2s;
  z-index: 99;
}
.scroll-top:hover { transform: scale(1.1); }
.scroll-top.show { display: flex; }

/* ===== SPRINT MODAL ===== */
.sprint-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44,24,16,0.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.sprint-modal-overlay.show { display: flex; }
.sprint-modal-box {
  background: var(--bg2);
  border: 2px double var(--rule);
  border-radius: 12px;
  max-width: 500px;
  width: 90%;
  padding: 1.5rem;
  animation: popIn 0.25s ease;
  position: relative;
  box-shadow: 0 12px 48px rgba(44,24,16,0.25);
}
.sprint-modal-close {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--rule);
  background: var(--bg3);
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.sprint-modal-close:hover {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}
.sprint-modal-point {
  font-size: 1rem;
  line-height: 1.8;
  color: var(--ink);
  margin: 0.5rem 0 1rem;
  padding-right: 1.5rem;
}
.sprint-modal-point .hl {
  color: var(--accent);
  font-weight: bold;
}
.sprint-modal-meta {
  display: flex;
  gap: 0.75rem;
  align-items: center;
  margin-bottom: 1rem;
  font-size: 0.8rem;
  color: var(--muted);
}
.sprint-modal-input {
  width: 100%;
  padding: 0.6rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg);
  color: var(--ink);
  font-family: 'ArsenalSC', sans-serif;
  font-size: 0.9rem;
  outline: none;
  margin-bottom: 0.75rem;
  transition: border-color 0.2s;
}
.sprint-modal-input:focus { border-color: var(--accent); }
.sprint-modal-input.correct {
  border-color: var(--success);
  background: rgba(45,106,79,0.05);
}
.sprint-modal-actions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.sprint-modal-actions .btn {
  flex: 1;
  text-align: center;
}
.sprint-modal-again {
  background: var(--bg3);
  color: var(--muted);
}

/* ===== 首页 HOME PANEL ===== */
.home-hero {
  margin-bottom: 1.5rem;
}
.home-hero-img {
  width: 100%;
  border-radius: 12px;
  border: 2px double var(--rule);
  display: block;
}
.home-hero-caption {
  text-align: center;
  font-size: 0.9rem;
  color: var(--muted);
  margin-top: 0.6rem;
  font-style: italic;
}

/* 激励卡片 */
.home-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.home-stat-card {
  text-align: center;
  padding: 1rem 0.5rem;
  border: 2px double var(--rule);
  border-radius: 8px;
  background: var(--bg2);
  position: relative;
}
.home-stat-card::before,
.home-stat-card::after {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  border: 2px solid var(--accent3);
  opacity: 0.3;
}
.home-stat-card::before {
  top: -1px; left: -1px;
  border-right: none; border-bottom: none;
  border-radius: 8px 0 0 0;
}
.home-stat-card::after {
  bottom: -1px; right: -1px;
  border-left: none; border-top: none;
  border-radius: 0 0 8px 0;
}
.home-stat-num {
  font-family: 'Outfit', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
}
.home-stat-label {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 0.25rem;
}

/* 章节进度 */
.home-section-title {
  font-size: 1rem;
  font-weight: bold;
  color: var(--ink);
  margin-bottom: 0.75rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--rule);
}
.home-progress-list {
  margin-bottom: 1.5rem;
}
.home-progress-item {
  margin-bottom: 0.6rem;
}
.home-progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--ink);
  margin-bottom: 0.25rem;
}
.home-progress-label span:last-child {
  color: var(--muted);
  font-size: 0.72rem;
}
.home-progress-bar {
  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
.home-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), #3d8a6f);
  border-radius: 4px;
  transition: width 0.4s ease;
  width: 0%;
}

/* 每小时柱状图 */
.home-chart {
  margin-bottom: 1.5rem;
}
.home-chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 100px;
  padding: 0 0.25rem;
}
.home-chart-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
  justify-content: flex-end;
}
.home-chart-bar {
  width: 100%;
  min-height: 2px;
  background: linear-gradient(to top, var(--accent), #e03050);
  border-radius: 3px 3px 0 0;
  transition: height 0.3s;
}
.home-chart-label {
  font-size: 0.55rem;
  color: var(--muted);
}

/* 鸡汤 */
.home-soup {
  margin-bottom: 1.5rem;
}
.home-soup-text {
  text-align: center;
  font-size: 0.95rem;
  color: var(--ink);
  line-height: 1.8;
  padding: 1.25rem;
  border: 2px double var(--rule);
  border-radius: 8px;
  background: var(--bg2);
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.home-soup-text::before,
.home-soup-text::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border: 2px solid var(--accent3);
  opacity: 0.3;
}
.home-soup-text::before {
  top: -1px; left: -1px;
  border-right: none; border-bottom: none;
  border-radius: 8px 0 0 0;
}
.home-soup-text::after {
  bottom: -1px; right: -1px;
  border-left: none; border-top: none;
  border-radius: 0 0 8px 0;
}
.soup-fade-enter {
  animation: soupFadeIn 0.6s ease;
}
@keyframes soupFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== MOBILE ===== */
@media (max-width: 640px) {
  .app-header { padding: 0.6rem 0.75rem; }
  .header-stats { gap: 0.75rem; }
  .stat-num { font-size: 1rem; }
  .main-content { padding: 1rem 0.75rem 3rem; }
  .card { padding: 1rem; }
  .sprint-header { padding: 1.25rem 0.75rem; }
  .sprint-stats { gap: 1.25rem; }
  .sprint-stat-num { font-size: 1.4rem; }
  .filter-bar { gap: 0.35rem; }
  .filter-chip { padding: 0.3rem 0.6rem; font-size: 0.72rem; }
  .home-stats { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
  .home-stat-num { font-size: 1.2rem; }
  .search-input { width: 160px; }
  .search-results { width: 300px; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.85) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.card, .sprint-card {
  animation: fadeIn 0.3s ease;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--bg2);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 0.6rem 1.25rem;
  border-radius: 10px;
  font-size: 0.82rem;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<header class="app-header">

    <div>
      <div class="app-logo-text">系解背书神器</div>
      <div class="app-logo-sub">系统解剖学期末冲刺</div>
    </div>
  </div>

        <div class="stat-label">重点</div>
      </div>

      <div class="search-results" id="searchResults"></div>

</header>

<!-- Tab Nav -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">
    <span class="tab-icon">🏠</span>首页
  </button>
  <button class="tab-btn" data-tab="fill" onclick="switchTab('fill')">
    <span class="tab-icon">📝</span>挖空背诵
  </button>
  <button class="tab-btn" data-tab="essay" onclick="switchTab('essay')">

  </button>
  <button class="tab-btn" data-tab="sprint" onclick="switchTab('sprint')">

  </button>
  <button class="tab-btn" data-tab="syllabus" onclick="switchTab('syllabus')">

  </button>
</nav>

<!-- Main Content -->
<main class="main-content">

  <!-- ===== HOME PANEL ===== -->
  <div class="tab-panel active" id="panel-home">

    <!-- 首图 -->
    <div class="home-hero">
      <img class="home-hero-img" src="assets/hero.jpg" alt="系解背书神器">
      <div class="home-hero-caption">系解背书神器 · 期末冲刺</div>
    </div>

    <!-- 激励卡片 -->
    <div class="home-stats">
      <div class="home-stat-card">
        <div class="home-stat-num" id="homeTotalCount">0</div>
        <div class="home-stat-label">今日背诵次数</div>
      </div>
      <div class="home-stat-card">
        <div class="home-stat-num" id="homeStudyHours">0</div>
        <div class="home-stat-label">今日已学(小时)</div>
      </div>
      <div class="home-stat-card">
        <div class="home-stat-num" id="homeStreak">0</div>
        <div class="home-stat-label">连续学习(天)</div>
      </div>

    <div class="home-chart">
      <div class="home-chart-bars" id="homeChartBars"></div>
    </div>

    <!-- 鸡汤 -->
    <div class="home-section-title">医学生鸡汤</div>
    <div class="home-soup">
      <div class="home-soup-text" id="homeSoupText"></div>

  </div>

  <!-- ===== FILL BLANKS PANEL ===== -->
  <div class="tab-panel" id="panel-fill">

    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-fill" id="essayProgress"></div></div>
      <div class="progress-text" id="essayProgressText">0 / 0</div>

    <div id="essayList"></div>
  </div>

  <!-- ===== SPRINT PANEL ===== -->
  <div class="tab-panel" id="panel-sprint">
    <div class="sprint-header">
      <div class="sprint-title">考前强化冲刺</div>
      <div class="sprint-desc">高频考点反复刷，重点知识不断复现，考前快速强化记忆</div>
      <div class="sprint-stats">
        <div class="sprint-stat">
          <div class="sprint-stat-num green" id="sprintCorrect">0</div>
          <div class="sprint-stat-label">答对</div>
        </div>
        <div class="sprint-stat">
          <div class="sprint-stat-num yellow" id="sprintTotal">0</div>
          <div class="sprint-stat-label">已练</div>

<script>
(function() {
  'use strict';

  // ===== 鸡汤内容（30组） =====

    '坚持住，背完系解你就是半个华佗（另外半个需要再背几年）'
  ];

  // ===== 背诵记录管理 =====
  var STORAGE_KEY = 'anatomy_memorize_records';

  function loadRecords() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { records: [], dailyStreak: 0, lastStudyDate: '' };
  }

  function saveRecords(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function addRecord(id, type, category) {
    var data = loadRecords();
    var today = getTodayStr();
    // 更新连续学习天数
    if (data.lastStudyDate !== today) {
      var yesterday = getDateStr(new Date(Date.now() - 86400000));
      if (data.lastStudyDate === yesterday) {
        data.dailyStreak++;
      } else if (data.lastStudyDate !== today) {
        data.dailyStreak = 1;
      }
      data.lastStudyDate = today;
    }
    data.records.push({
      id: id,
      type: type,
      category: category,
      timestamp: Date.now()
    });
    saveRecords(data);
  }

  function getTodayStr() {
    return getDateStr(new Date());
  }

  function getDateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // 获取某卡片今日背诵次数
  function getCardMemCount(id) {
    var data = loadRecords();
    var today = getTodayStr();
    return data.records.filter(function(r) {
      return r.id === id && getDateStr(new Date(r.timestamp)) === today;
    }).length;
  }

  // 获取某卡片总背诵次数
  function getCardMemCountAll(id) {
    var data = loadRecords();
    return data.records.filter(function(r) { return r.id === id; }).length;
  }

  // 获取今日所有记录
  function getTodayRecords() {
    var data = loadRecords();
    var today = getTodayStr();
    return data.records.filter(function(r) {
      return getDateStr(new Date(r.timestamp)) === today;
    });
  }

  // ===== STATE =====
  var state = {
    currentTab: 'home',
    fillCategory: 'all',
    fillMode: 'click',
    fillRevealed: {},
    essayCategory: 'all',
    essayType: 'all',
    essayRevealed: {},
    sprintCategory: 'all',
    sprintMode: 'all',
    sprintMastered: {},
    sprintCorrect: 0,
    sprintTotal: 0,
    soupIndex: 0,
    favorites: {}, // id -> true
    modalFillItem: null, // current fill modal item for blank reveal
    modalEssayItem: null, // current essay modal item
    modalItem: null, // current sprint modal item
    modalMastered: false
  };

  // ===== SYLLABUS =====
  function findRefItem(refId) {
    if (!refId) return null;
    var prefix = refId.split('_')[0];
    var arr = prefix === 'kp' ? APP_DATA.keyPoints : (prefix === 'essay' ? APP_DATA.essayQuestions : APP_DATA.fillBlanks);
    var item = arr.find(function(i) { return i.id === refId; });
    if (!item) return null;
    return { id: refId, type: prefix, item: item };
  }
  window.jumpToRef = function(refId, type, event) {
    if (event) event.stopPropagation();
    var item = findRefItem(refId);
    if (!item) return;
    if (type === 'kp') {
      switchTab('sprint');
      state.sprintCategory = 'all';
      state.sprintMode = 'all';
      renderSprintList(true);
      setTimeout(function() {
        var el = document.getElementById('sprint-' + refId);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(function() { el.classList.remove('highlight'); }, 2000); }
      }, 100);
    } else if (type === 'essay') {
      switchTab('essay');
      state.essayCategory = 'all';
      state.essayType = 'all';
      renderEssayList();
      setTimeout(function() {
        var el = document.getElementById('essay-' + refId);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(function() { el.classList.remove('highlight'); }, 2000); }
      }, 100);
    } else {
      switchTab('fill');
      state.fillCategory = 'all';
      renderFillList();
      setTimeout(function() {
        var el = document.getElementById('fill-' + refId);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(function() { el.classList.remove('highlight'); }, 2000); }
      }, 100);
    }
  };

  var syllabusChecked = {};
  function loadSyllabusChecked() {
    try {
      var saved = localStorage.getItem('anatomy_syllabus_checked');
      if (saved) syllabusChecked = JSON.parse(saved);
    } catch(e) {}
  }
  function saveSyllabusChecked() {
    try { localStorage.setItem('anatomy_syllabus_checked', JSON.stringify(syllabusChecked)); } catch(e) {}
  }
  var syllabusLevel = 'all';
  window.filterSyllabus = function(level) {
    syllabusLevel = level;
    document.querySelectorAll('.syllabus-filter .filter-chip').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.level === level);
    });
    renderSyllabus();
  };
  window.toggleSyllabusPoint = function(id) {
    if (syllabusChecked[id]) {
      delete syllabusChecked[id];
    } else {
      syllabusChecked[id] = true;
    }
    saveSyllabusChecked();
    renderSyllabus();
  };
  window.toggleRefCard = function(refKey, event) {
    if (event) event.stopPropagation();
    var body = document.getElementById('ref-body-' + refKey);
    var arrow = document.getElementById('ref-arrow-' + refKey);
    if (body) {
      var isHidden = body.style.display === 'none';
      body.style.display = isHidden ? 'block' : 'none';
      if (arrow) arrow.textContent = isHidden ? '▲' : '▼';
    }
  };
  window.toggleSyllabusSection = function(sectionId) {
    var el = document.getElementById('syllabus-section-' + sectionId);
    var arrow = document.getElementById('syllabus-arrow-' + sectionId);
    if (el) {
      var isHidden = el.style.display === 'none';
      el.style.display = isHidden ? 'block' : 'none';
      if (arrow) arrow.classList.toggle('open', isHidden);
    }
  };
  window.toggleSyllabusChapter = function(chapterId) {
    var el = document.getElementById('syllabus-chapter-' + chapterId);
    var arrow = document.getElementById('syllabus-chapter-arrow-' + chapterId);
    if (el) {
      var isHidden = el.style.display === 'none';
      el.style.display = isHidden ? 'block' : 'none';
      if (arrow) arrow.classList.toggle('open', isHidden);
    }
  };
  function renderSyllabus() {
    if (typeof SYLLABUS_DATA === 'undefined') return;
    var container = document.getElementById('syllabusContent');
    var totalPoints = 0, checkedPoints = 0;
    var html = '';
    var currentChapter = '';
    SYLLABUS_DATA.forEach(function(section) {
      // Chapter header
      if (section.chapter !== currentChapter) {
        currentChapter = section.chapter;
        html += '<div class="syllabus-chapter">';
        html += '<div class="syllabus-chapter-title" onclick="toggleSyllabusChapter(\'' + section.id + '\')">';
        html += '<span>' + currentChapter + '</span>';
        html += '<span class="syllabus-chapter-arrow open" id="syllabus-chapter-arrow-' + section.id + '">▶</span>';
        html += '</div>';
        html += '<div id="syllabus-chapter-' + section.id + '">';
      }
      // Section
      html += '<div class="syllabus-section">';
      html += '<div class="syllabus-section-title" onclick="toggleSyllabusSection(\'' + section.id + '\')">';
      html += '<span>' + section.section + '</span>';
      html += '<span class="syllabus-chapter-arrow open" id="syllabus-arrow-' + section.id + '">▶</span>';
      html += '</div>';
      html += '<div class="syllabus-points" id="syllabus-section-' + section.id + '">';
      section.points.forEach(function(pt) {
        totalPoints++;
        if (syllabusLevel !== 'all' && pt.level !== syllabusLevel) return;
        var checked = syllabusChecked[pt.id];
        if (checked) checkedPoints++;
        var levelClass = pt.level === '掌握' ? 'master' : (pt.level === '熟悉' ? 'familiar' : 'understand');
        html += '<div class="syllabus-point' + (checked ? ' checked' : '') + '">';
        html += '<div class="syllabus-point-main" onclick="toggleSyllabusPoint(\'' + pt.id + '\')">';
        html += '<span class="syllabus-check">' + (checked ? '✓' : '') + '</span>';
        html += '<span class="syllabus-level ' + levelClass + '">' + pt.level + '</span>';
        html += '<span class="syllabus-point-text">' + pt.text + '</span>';
        html += '</div>';
        // 参考资料（直接展开显示）
        if (pt.refs && pt.refs.length > 0) {
          html += '<div class="syllabus-refs">';
          pt.refs.forEach(function(refId, idx) {
            var refItem = findRefItem(refId);
            if (!refItem) return;
            var typeLabel = refItem.type === 'kp' ? '冲刺' : (refItem.type === 'essay' ? '大题' : '挖空');
            var content = '';
            if (refItem.type === 'kp') {
              content = '<div class="ref-content-text">' + (refItem.item.point || '') + '</div>';
            } else if (refItem.type === 'essay') {
              content = '<div class="ref-content-text"><strong>问：</strong>' + (refItem.item.question || '') + '</div>' +
                '<div class="ref-content-answer"><strong>答：</strong>' + formatAnswer(refItem.item.answer || '') + '</div>';
            } else {
              var t = refItem.item.text || '';
              var b = refItem.item.blanks || [];
              b.forEach(function(blank) {
                t = t.replace(new RegExp('(' + blank.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g'), '<span class="ref-blank">$1</span>');
              });
              content = '<div class="ref-content-text">' + t + '</div>';
            }
            html += '<div class="syllabus-ref-card">';
            html += '<div class="syllabus-ref-header" onclick="toggleRefCard(\'' + pt.id + '_' + idx + '\', event)">';
            html += '<span class="syllabus-ref-type">' + typeLabel + '</span>';
            html += '<span class="syllabus-ref-preview">' + (refItem.type === 'kp' ? (refItem.item.point || '').substring(0, 30) + '...' : (refItem.type === 'essay' ? (refItem.item.question || '').substring(0, 30) + '...' : (refItem.item.text || '').substring(0, 30) + '...')) + '</span>';
            html += '<span class="syllabus-ref-arrow" id="ref-arrow-' + pt.id + '_' + idx + '">▼</span>';
            html += '</div>';
            html += '<div class="syllabus-ref-body" id="ref-body-' + pt.id + '_' + idx + '">' + content + '</div>';
            html += '</div>';
          });
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';
      // Close chapter if next section is different chapter
      var nextSection = SYLLABUS_DATA[SYLLABUS_DATA.indexOf(section) + 1];
      if (!nextSection || nextSection.chapter !== currentChapter) {
        html += '</div>';
      }
    });
    container.innerHTML = html;
    // Update progress
    var progressEl = document.getElementById('syllabusProgress');
    if (progressEl) {
      var total = 0, checked = 0;
      SYLLABUS_DATA.forEach(function(s) {
        s.points.forEach(function(pt) {
          total++;
          if (syllabusChecked[pt.id]) checked++;
        });
      });
      progressEl.textContent = '已完成 ' + checked + ' / ' + total + ' 个知识点 (' + (total > 0 ? Math.round(checked/total*100) : 0) + '%)';
    }
  }

  // ===== INIT =====
  function init() {
    loadFavorites();
    loadSyllabusChecked();
    buildFilters();
    renderSyllabus();
    renderAll();
    updateStats();
    renderHome();

    // 搜索
    var searchToggle = document.getElementById('searchToggle');
    var searchWrap = document.getElementById('searchWrap');
    var searchInput = document.getElementById('searchInput');
    var searchResults = document.getElementById('searchResults');
    searchToggle.addEventListener('click', function() {
      searchWrap.classList.toggle('open');
      if (searchWrap.classList.contains('open')) {
        searchInput.focus();
      } else {
        searchInput.value = '';
        searchResults.classList.remove('open');
      }
    });
    // 点击外部关闭搜索
    document.addEventListener('click', function(e) {
      if (!searchWrap.contains(e.target) && e.target !== searchToggle) {
        searchWrap.classList.remove('open');
        searchInput.value = '';
        searchResults.classList.remove('open');
      }
    });
    // 搜索防抖
    var searchTimer = null;
    searchInput.addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function() {
        doSearch(searchInput.value.trim());
      }, 300);
    });

    // Sprint modal events
    var randomBtn = document.getElementById('randomSprintBtn');
    if (randomBtn) randomBtn.addEventListener('click', randomSprint);
    var modalClose = document.getElementById('sprintModalClose');
    if (modalClose) modalClose.addEventListener('click', closeSprintModal);
    var modalMasteredEl = document.getElementById('sprintModalMastered');
    if (modalMasteredEl) modalMasteredEl.addEventListener('click', modalMarkMastered);
    var modalPeekEl = document.getElementById('sprintModalPeek');
    if (modalPeekEl) modalPeekEl.addEventListener('click', modalPeek);
    var modalAgain = document.getElementById('sprintModalAgain');
    if (modalAgain) modalAgain.addEventListener('click', randomSprint);
    var modalFav = document.getElementById('sprintModalFav');
    if (modalFav) modalFav.addEventListener('click', function() {
      if (state.modalItem) toggleFavorite(state.modalItem.id);
      updateModalFavBtn('sprintModalFav', state.modalItem ? state.modalItem.id : null);
    });
    var modalOverlay = document.getElementById('sprintModal');
    if (modalOverlay) {
      modalOverlay.addEventListener('click', function(e) {
        if (e.target === modalOverlay) closeSprintModal();
      });
    }

    // Fill modal events
    var fillModalClose = document.getElementById('fillModalClose');
    if (fillModalClose) fillModalClose.addEventListener('click', closeFillModal);
    var fillModalReveal = document.getElementById('fillModalRevealAll');
    if (fillModalReveal) fillModalReveal.addEventListener('click', fillModalRevealAll);
    var fillModalReset = document.getElementById('fillModalReset');
    if (fillModalReset) fillModalReset.addEventListener('click', fillModalResetBlanks);
    var fillModalAgain = document.getElementById('fillModalAgain');
    if (fillModalAgain) fillModalAgain.addEventListener('click', randomFill);
    var fillModalFav = document.getElementById('fillModalFav');
    if (fillModalFav) fillModalFav.addEventListener('click', function() {
      if (state.modalFillItem) toggleFavorite(state.modalFillItem.id);
      updateModalFavBtn('fillModalFav', state.modalFillItem ? state.modalFillItem.id : null);
    });
    var fillOverlay = document.getElementById('fillModal');
    if (fillOverlay) {
      fillOverlay.addEventListener('click', function(e) {

  // ===== SEARCH =====
  function doSearch(query) {
    var resultsEl = document.getElementById('searchResults');
    if (!query) {
      resultsEl.classList.remove('open');
      resultsEl.innerHTML = '';
      return;
    }
    var results = [];
    var q = query.toLowerCase();
    // 搜索 fillBlanks
    APP_DATA.fillBlanks.forEach(function(item) {
      if (item.text.toLowerCase().indexOf(q) >= 0) {
        results.push({ type: 'fill', id: item.id, category: item.category, text: item.text });
      }
    });
    // 搜索 essayQuestions
    APP_DATA.essayQuestions.forEach(function(item) {
      if (item.question.toLowerCase().indexOf(q) >= 0 || item.answer.toLowerCase().indexOf(q) >= 0) {
        results.push({ type: 'essay', id: item.id, category: item.category, text: item.question });
      }
    });
    // 搜索 keyPoints
    APP_DATA.keyPoints.forEach(function(item) {
      if (item.point.toLowerCase().indexOf(q) >= 0) {
        results.push({ type: 'key', id: item.id, category: item.category, text: item.point });
      }
    });

    if (results.length === 0) {
      resultsEl.innerHTML = '<div class="search-empty">未找到相关内容</div>';
      resultsEl.classList.add('open');
      return;
    }
    // 最多显示20条
    results = results.slice(0, 20);
    var html = '';
    results.forEach(function(r) {
      var typeLabel = r.type === 'fill' ? '挖空' : (r.type === 'essay' ? '大题' : '冲刺');
      var typeClass = r.type === 'fill' ? 'sr-type-fill' : (r.type === 'essay' ? 'sr-type-essay' : 'sr-type-key');
      // 高亮匹配文字
      var displayText = escapeHtml(r.text);
      if (displayText.length > 80) displayText = displayText.substring(0, 80) + '...';
      var regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
      displayText = displayText.replace(regex, '<mark>$1</mark>');
      html += '<div class="search-result-item" data-type="' + r.type + '" data-id="' + r.id + '">';
      html += '<span class="search-result-type ' + typeClass + '">' + typeLabel + '</span>';
      html += '<span class="search-result-text">' + displayText + '</span>';
      html += '</div>';
    });
    resultsEl.innerHTML = html;
    resultsEl.classList.add('open');
    // 绑定点击事件
    resultsEl.querySelectorAll('.search-result-item').forEach(function(el) {
      el.addEventListener('click', function() {
        var type = el.dataset.type;
        var id = el.dataset.id;
        // 映射type到tab
        var tabMap = { fill: 'fill', essay: 'essay', key: 'sprint' };
        switchTab(tabMap[type]);
        // 关闭搜索
        document.getElementById('searchWrap').classList.remove('open');
        document.getElementById('searchInput').value = '';
        resultsEl.classList.remove('open');
        // 滚动到对应卡片
        setTimeout(function() {
          var prefix = type === 'key' ? 'sprint-' : type + '-';
          var target = document.getElementById(prefix + id);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function renderHome() {
    renderHomeStats();

  function renderHomeStats() {
    var data = loadRecords();
    var todayRecords = getTodayRecords();
    // 今日背诵总次数
    document.getElementById('homeTotalCount').textContent = todayRecords.length;
    // 今日已学小时（从第一条到最后一条记录的时间跨度，最多算24小时）
    if (todayRecords.length >= 2) {
      var first = todayRecords[0].timestamp;
      var last = todayRecords[todayRecords.length - 1].timestamp;
      var hours = Math.max(1, Math.round((last - first) / 3600000));
      document.getElementById('homeStudyHours').textContent = Math.min(hours, 24);
    } else {
      document.getElementById('homeStudyHours').textContent = todayRecords.length > 0 ? 1 : 0;
    }
    // 连续学习天数
    document.getElementById('homeStreak').textContent = data.dailyStreak || 0;
  }

  function renderHomeProgress() {
    // 按category统计各章节已背诵/总数
    var allItems = [];
    APP_DATA.fillBlanks.forEach(function(item) {
      allItems.push({ id: item.id, category: item.category, type: 'fill' });
    });
    APP_DATA.essayQuestions.forEach(function(item) {
      allItems.push({ id: item.id, category: item.category, type: 'essay' });
    });
    APP_DATA.keyPoints.forEach(function(item) {
      allItems.push({ id: item.id, category: item.category, type: 'key' });
    });

    // 按category分组
    var catMap = {};
    allItems.forEach(function(item) {
      if (!catMap[item.category]) catMap[item.category] = [];
      catMap[item.category].push(item.id);
    });

    var data = loadRecords();
    var today = getTodayStr();
    var todayIds = {};
    data.records.forEach(function(r) {
      if (getDateStr(new Date(r.timestamp)) === today) {
        todayIds[r.id] = true;
      }
    });

    var container = document.getElementById('homeProgressList');
    var html = '';
    var cats = Object.keys(catMap);
    cats.forEach(function(cat) {
      var total = catMap[cat].length;
      var done = catMap[cat].filter(function(id) { return todayIds[id]; }).length;
      var pct = total > 0 ? Math.round(done / total * 100) : 0;
      html += '<div class="home-progress-item">';
      html += '<div class="home-progress-label"><span>' + cat + '</span><span>' + done + ' / ' + total + '</span></div>';
      html += '<div class="home-progress-bar"><div class="home-progress-fill" style="width:' + pct + '%"></div></div>';
      html += '</div>';
    });
    container.innerHTML = html;
  }

  function renderHomeChart() {
    var todayRecords = getTodayRecords();
    // 统计每小时
    var hourCounts = {};
    for (var h = 0; h < 24; h++) hourCounts[h] = 0;
    todayRecords.forEach(function(r) {
      var hour = new Date(r.timestamp).getHours();
      hourCounts[hour]++;
    });
    var maxCount = Math.max.apply(null, Object.values(hourCounts)) || 1;

    var container = document.getElementById('homeChartBars');
    var html = '';
    // 显示0-23时的柱状图
    for (var i = 0; i < 24; i++) {
      var pct = Math.round(hourCounts[i] / maxCount * 100);
      var height = Math.max(2, pct);
      html += '<div class="home-chart-bar-wrap">';
      html += '<div class="home-chart-bar" style="height:' + height + '%"></div>';
      html += '<div class="home-chart-label">' + i + '</div>';
      html += '</div>';
    }
    container.innerHTML = html;
  }

      if (state.fillMode === 'click') {

            var cls = 'blank-slot';
            if (revealed.has(i)) cls += ' revealed';
            return '<span class="' + cls + '" data-id="' + item.id + '" data-idx="' + i + '" onclick="toggleBlank(this)">' + blank + '</span>';
          });
        });
        html += text;
      } else {
        var text2 = item.text;
        item.blanks.forEach(function(blank, i) {
          text2 = text2.replace(blank, function() {
            var cls = 'blank-slot';
            if (revealed.has(i)) cls += ' revealed';
            return '<span class="' + cls + '" data-id="' + item.id + '" data-idx="' + i + '">' + (revealed.has(i) ? blank : '______') + '</span>';
          });
        });
        html += text2;
      }
      html += '</div>';
      html += '<div class="card-actions">';
      html += '<button class="btn btn-primary" onclick="revealAllBlanks(\'' + item.id + '\')">揭示全部</button>';
      html += '<button class="btn btn-danger" onclick="resetBlanks(\'' + item.id + '\')">重新隐藏</button>';

        html += '<button class="btn" onclick="checkBlankInput(\'' + item.id + '\')">检查答案</button>';

  window.toggleBlank = function(el) {
    var id = el.dataset.id;
    var idx = parseInt(el.dataset.idx);
    if (!state.fillRevealed[id]) state.fillRevealed[id] = new Set();
    if (state.fillRevealed[id].has(idx)) {
      state.fillRevealed[id].delete(idx);
      el.classList.remove('revealed');
    } else {
      state.fillRevealed[id].add(idx);
      el.classList.add('revealed');
    }
    updateFillProgress();
  };

  window.revealAllBlanks = function(id) {
    if (!state.fillRevealed[id]) state.fillRevealed[id] = new Set();
    var item = APP_DATA.fillBlanks.find(function(f) { return f.id === id; });
    if (item) {
      item.blanks.forEach(function(_, i) { state.fillRevealed[id].add(i); });
      renderFillList();
    }
  };

  window.resetBlanks = function(id) {
    state.fillRevealed[id] = new Set();
    renderFillList();
  };

  window.checkBlankInput = function(id) {
    var item = APP_DATA.fillBlanks.find(function(f) { return f.id === id; });
    if (!item) return;
    var inputs = document.querySelectorAll('input[data-fill-id="' + id + '"]');
    var allCorrect = true;
    inputs.forEach(function(input) {
      var idx = parseInt(input.dataset.fillIdx);
      var answer = item.blanks[idx];
      var userVal = input.value.trim();
      if (userVal === answer || answer.indexOf(userVal) >= 0 || userVal.indexOf(answer) >= 0) {
        input.classList.add('correct');
        input.classList.remove('wrong');
        if (!state.fillRevealed[id]) state.fillRevealed[id] = new Set();
        state.fillRevealed[id].add(idx);
      } else {
        input.classList.add('wrong');
        input.classList.remove('correct');
        allCorrect = false;
      }
    });
    if (allCorrect) {
      showToast('全部正确！太棒了！');
    } else {
      showToast('部分答案有误，已标红显示');
    }
    renderFillList();
  };

      html = html.replace(regex, '<span class="blank-slot" data-idx="' + idx + '" onclick="revealSlotInModal(this)" style="border-bottom:2px dashed var(--accent);cursor:pointer;font-weight:bold;color:transparent;background:transparent;padding:0 0.3rem">______</span>');
    });
    document.getElementById('fillModalText').innerHTML = html;

      section.classList.toggle('show', state.essayRevealed[id]);
    }
    if (btn) {
      btn.classList.toggle('revealed', state.essayRevealed[id]);
      btn.textContent = state.essayRevealed[id] ? '隐藏答案（再次背诵）' : '显示答案';
    }
    updateEssayProgress();
  };

  window.randomEssay = function() {
    var items = APP_DATA.essayQuestions.filter(function(item) {
      var catMatch = state.essayCategory === 'all' || item.category === state.essayCategory;
      var typeMatch = state.essayType === 'all' || item.type === state.essayType;
      return catMatch && typeMatch;
    });
    if (items.length === 0) return;
    var item = items[Math.floor(Math.random() * items.length)];
    showEssayModal(item);
  };

  function showEssayModal(item) {
    state.modalEssayItem = item;
    document.getElementById('essayModalQuestion').innerHTML = '<strong>[' + (item.type || '简答题') + ']</strong> ' + (item.question || '');
    document.getElementById('essayModalAnswer').innerHTML = formatAnswer(item.answer || '');
    document.getElementById('essayModalAnswer').style.display = 'none';
    document.getElementById('essayModalToggle').textContent = '显示答案';
    document.getElementById('essayModalMeta').innerHTML = '<span>' + (item.category || '') + '</span>';
    document.getElementById('essayModal').classList.add('show');
    updateModalFavBtn('essayModalFav', item.id);
  }

  window.closeEssayModal = function() {
    document.getElementById('essayModal').classList.remove('show');
  };

  window.essayModalToggle = function() {
    var ans = document.getElementById('essayModalAnswer');
    var btn = document.getElementById('essayModalToggle');
    if (ans.style.display === 'none') {
      ans.style.display = 'block';
      btn.textContent = '隐藏答案';
    } else {
      ans.style.display = 'none';
      btn.textContent = '显示答案';
    }
  };

  function formatAnswer(answer) {
    var html = answer;
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/([①②③④⑤⑥⑦⑧⑨⑩])/g, '<br>$1');
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function updateEssayProgress() {
    var total = APP_DATA.essayQuestions.length;
    var done = Object.keys(state.essayRevealed).filter(function(k) { return state.essayRevealed[k]; }).length;
    var pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('essayProgress').style.width = pct + '%';
    document.getElementById('essayProgressText').textContent = done + ' / ' + total;
  }

  // ===== SPRINT MODE =====
  window.setSprintMode = function(mode) {
    state.sprintMode = mode;
    document.querySelectorAll('#panel-sprint .mode-btn').forEach(function(b) {
      var txt = b.textContent;
      var match = mode === 'all' ? txt.indexOf('全部') >= 0
                : mode === 'unmastered' ? txt.indexOf('未掌握') >= 0
                : mode === 'important' ? txt.indexOf('高频') >= 0
                : false;
      b.classList.toggle('active', match);
    });
    renderSprintList();
  };

  function renderSprintList(skipShuffle) {
    var items = APP_DATA.keyPoints.filter(function(item) {
      if (state.sprintCategory === '__fav__') return state.favorites[item.id];
      var catMatch = state.sprintCategory === 'all' || item.category === state.sprintCategory;
      if (state.sprintMode === 'unmastered') return catMatch && !state.sprintMastered[item.id];
      if (state.sprintMode === 'important') return catMatch && item.importance >= 3;
      return catMatch;
    });
    if (!skipShuffle) {
      items = shuffleArray(items);
    }
    var container = document.getElementById('sprintList');
    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">全部掌握！太厉害了！</div></div>';
      return;
    }
    var html = '';
    items.forEach(function(rawItem) {
      var item = applyCorrection(rawItem);
      var mastered = state.sprintMastered[item.id];
      var memCount = getCardMemCountAll(item.id);
      html += '<div class="sprint-card level-' + item.importance + (mastered ? ' mastered' : '') + '" id="sprint-' + item.id + '">';
      html += '<div class="sprint-point">' + highlightKeywords(item.point) + '</div>';
      html += '<div class="sprint-meta">';
      html += '<span class="importance-stars">';
      for (var i = 0; i < 3; i++) {
        html += '<span class="star ' + (i < item.importance ? '' : 'empty') + '">★</span>';
      }
      html += '</span>';
      html += '<span class="sprint-category">' + item.category + '</span>';
      if (memCount > 0) html += '<span class="mem-badge">已背' + memCount + '次</span>';
      html += corrBadgeHtml(item.id);
      html += favBtnHtml(item.id);
      html += corrBtnHtml(item.id);
      html += '</div>';
      if (!mastered) {
        html += '<div class="sprint-actions">';
        html += '<input class="sprint-input" placeholder="默念后点击「已掌握」" id="sprint-input-' + item.id + '">';
        html += '<button class="btn btn-primary btn-sm" onclick="markSprintMastered(\'' + item.id + '\')">已掌握</button>';
        html += '<button class="btn btn-sm" onclick="peekSprint(\'' + item.id + '\')">提示</button>';
        html += '<button class="btn btn-secondary btn-sm" onclick="markMemorized(\'' + item.id + '\',\'key\',\'' + item.category + '\')">已背诵</button>';
        html += '</div>';
      } else {
        html += '<div class="sprint-actions">';
        html += '<button class="btn btn-sm" onclick="unmarkSprintMastered(\'' + item.id + '\')">重新练习</button>';
        html += '</div>';
      }
      html += '</div>';
    });
    container.innerHTML = html;
    updateSprintStats();
  }

  window.markSprintMastered = function(id) {
    if (state.sprintMastered[id]) return;
    state.sprintMastered[id] = true;
    state.sprintCorrect++;
    state.sprintTotal++;
    // 记录背诵
    var item = APP_DATA.keyPoints.find(function(k) { return k.id === id; });
    if (item) addRecord(id, 'key', item.category);
    showToast('已标记为掌握！');
    renderSprintList(true);
    updateStats();
  };

  window.unmarkSprintMastered = function(id) {
    if (!state.sprintMastered[id]) return;
    delete state.sprintMastered[id];
    state.sprintCorrect = Math.max(0, state.sprintCorrect - 1);
    state.sprintTotal = Math.max(0, state.sprintTotal - 1);
    renderSprintList(true);
    updateStats();
  };

  window.peekSprint = function(id) {
    var item = APP_DATA.keyPoints.find(function(k) { return k.id === id; });
    if (!item) return;
    var input = document.getElementById('sprint-input-' + id);
    if (input) {
      input.value = item.point;
      input.classList.add('correct');
    }
  };

  window.randomSprint = function() {
    var items = APP_DATA.keyPoints.filter(function(item) {
      var catMatch = state.sprintCategory === 'all' || item.category === state.sprintCategory;
      if (state.sprintMode === 'unmastered') return catMatch && !state.sprintMastered[item.id];
      if (state.sprintMode === 'important') return catMatch && item.importance >= 3;
      return catMatch;
    });
    if (items.length === 0) {
      showToast('没有符合条件的考点');
      return;
    }
    state.modalItem = items[Math.floor(Math.random() * items.length)];
    showSprintModal(state.modalItem);
  };

  /* ---- Sprint Random Modal ---- */
  function showSprintModal(item) {
    var point = item.point || '';
    var cat = item.category || '';
    var starsHtml = '';
    for (var si = 0; si < 3; si++) {
      starsHtml += '<span class="star ' + (si < (item.importance || 1) ? '' : 'empty') + '">★</span>';
    }
    document.getElementById('sprintModalPoint').innerHTML = highlightKeywords(point);
    document.getElementById('sprintModalMeta').innerHTML = starsHtml + '<span style="margin-left:6px">' + cat + '</span>';
    var input = document.getElementById('sprintModalInput');
    input.value = '';
    input.className = 'sprint-modal-input';
    input.disabled = false;
    document.getElementById('sprintModal').classList.add('show');
    state.modalMastered = false;
    updateModalFavBtn('sprintModalFav', item.id);
    setTimeout(function() { input.focus(); }, 100);
  }

  window.closeSprintModal = function() {
    document.getElementById('sprintModal').classList.remove('show');
  };

  window.modalMarkMastered = function() {
    if (!state.modalItem) return;
    var id = state.modalItem.id;
    if (state.sprintMastered[id]) {
      showToast('已标记为掌握');
      return;
    }
    state.sprintMastered[id] = true;
    state.sprintCorrect++;
    state.sprintTotal++;
    state.modalMastered = true;
    addRecord(id, 'key', state.modalItem.category);
    document.getElementById('sprintModalInput').disabled = true;
    showToast('已标记为掌握！');
    renderSprintList(true);
    updateStats();
  };

  window.modalPeek = function() {
    if (!state.modalItem) return;
    var input = document.getElementById('sprintModalInput');
    input.value = state.modalItem.point || '';
    input.className = 'sprint-modal-input correct';
  };

  // Close modal on Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeSprintModal();
    if (e.key === 'Enter' && document.getElementById('sprintModal').classList.contains('show')) {
      modalMarkMastered();
    }
  });

  function highlightKeywords(text) {
    var html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    var keywords = ['动脉','静脉','神经','肌肉','骨','关节','韧带','腱','膜','核','束','窦','管','孔','裂','角','弓','窝','沟','隆凸','三角','峡','盘','瓣','囊','室','房','网','丛','缘','面','头','颈','体','底','尖','门','蒂','裂孔','隐窝','交叉','乳头','切迹','隆起','膨大','凹陷','狭窄','膨隆','扁桃体','圆锥','动脉环','传导束','纤维束','神经核','神经节','感受器','中枢'];
    keywords.sort(function(a, b) { return b.length - a.length; });
    var escaped = keywords.map(function(kw) {
      return kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    });
    var combined = new RegExp('(' + escaped.join('|') + ')', 'g');
    html = html.replace(combined, '<mark class="hl">$1</mark>');
    return html;
  }

  function updateSprintStats() {
    var mastered = Object.keys(state.sprintMastered).length;
    var total = APP_DATA.keyPoints.length;
    document.getElementById('sprintCorrect').textContent = mastered;
    document.getElementById('sprintTotal').textContent = state.sprintTotal;
    document.getElementById('sprintRemain').textContent = total - mastered;
  }

  // ===== 背诵记录按钮 =====
  window.markMemorized = function(id, type, category) {
    addRecord(id, type, category);
    showToast('已记录背诵 +1');
    // 刷新当前列表以更新徽章
    if (type === 'fill') renderFillList();
    else if (type === 'essay') renderEssayList();
    else if (type === 'key') renderSprintList(true);
    updateStats();
  };

  // ===== UTILS =====
  function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
  }

  // ===== FAVORITES =====
  function loadFavorites() {
    try {
      var saved = localStorage.getItem('anatomy_favorites');
      if (saved) state.favorites = JSON.parse(saved);
    } catch(e) {}
  }
  function saveFavorites() {
    try { localStorage.setItem('anatomy_favorites', JSON.stringify(state.favorites)); } catch(e) {}
  }
  window.toggleFavorite = function(id, event) {
    if (event) event.stopPropagation();
    if (state.favorites[id]) {
      delete state.favorites[id];
      showToast('已取消收藏');
    } else {
      state.favorites[id] = true;
      showToast('已收藏 ★');
    }
    saveFavorites();
    // Update all fav buttons with this id
    document.querySelectorAll('.fav-btn[data-id="' + id + '"]').forEach(function(btn) {
      if (state.favorites[id]) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  };
  function favBtnHtml(id) {
    var active = state.favorites[id] ? ' active' : '';
    return '<button class="fav-btn' + active + '" data-id="' + id + '" onclick="toggleFavorite(\'' + id + '\', event)" title="收藏"><span class="fav-icon">★</span></button>';
  }
  function isFavFilter() {
    return state.fillCategory === '__fav__' || state.essayCategory === '__fav__' || state.sprintCategory === '__fav__';
  }
  function updateModalFavBtn(btnId, id) {
    var btn = document.getElementById(btnId);
    if (!btn || !id) return;
    if (state.favorites[id]) {
      btn.textContent = '★ 已收藏';
      btn.style.color = 'var(--accent3)';
    } else {
      btn.textContent = '★ 收藏';
      btn.style.color = '';
    }
  }

  // ===== CORRECTIONS =====
  function loadCorrections() {
    try {
      var saved = localStorage.getItem('anatomy_corrections');
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return {};
  }
  function saveCorrections(data) {
    try { localStorage.setItem('anatomy_corrections', JSON.stringify(data)); } catch(e) {}
  }
  function getCorrection(id) {
    return loadCorrections()[id] || null;
  }
  function setCorrection(id, patch) {
    var all = loadCorrections();
    all[id] = patch;
    saveCorrections(all);
  }
  function resetCorrection(id) {
    var all = loadCorrections();
    delete all[id];
    saveCorrections(all);
  }
  function applyCorrection(item) {
    var corr = getCorrection(item.id);
    if (!corr) return item;
    var copy = JSON.parse(JSON.stringify(item));
    if (corr.text !== undefined) copy.text = corr.text;
    if (corr.blanks !== undefined) copy.blanks = corr.blanks;
    if (corr.question !== undefined) copy.question = corr.question;
    if (corr.answer !== undefined) copy.answer = corr.answer;
    if (corr.point !== undefined) copy.point = corr.point;
    return copy;
  }
  function corrBadgeHtml(id) {
    var corr = getCorrection(id);
    if (!corr) return '';
    return '<span class="corr-badge">已修改</span>' +
      '<button class="corr-reset-btn" onclick="resetCardCorrection(\'' + id + '\', event)" title="恢复原始版本">↺</button>';
  }
  function corrBtnHtml(id) {
    return '<button class="corr-btn" onclick="openCorrection(\'' + id + '\', event)" title="勘误">✏️</button>';
  }
  window.openCorrection = function(id, event) {
    if (event) event.stopPropagation();
    state.corrId = id;
    // Find original item
    var item = APP_DATA.fillBlanks.find(function(i) { return i.id === id; }) ||
               APP_DATA.essayQuestions.find(function(i) { return i.id === id; }) ||
               APP_DATA.keyPoints.find(function(i) { return i.id === id; });
    if (!item) return;
    state.corrOriginal = JSON.parse(JSON.stringify(item));
    var corr = getCorrection(id);
    var current = applyCorrection(item);
    // Determine type
    var isFill = APP_DATA.fillBlanks.some(function(i) { return i.id === id; });
    var isEssay = APP_DATA.essayQuestions.some(function(i) { return i.id === id; });
    var isKey = APP_DATA.keyPoints.some(function(i) { return i.id === id; });
    state.corrType = isFill ? 'fill' : (isEssay ? 'essay' : 'key');
    // Show/hide fields
    document.getElementById('corrBlanksWrap').style.display = isFill ? 'block' : 'none';
    document.getElementById('corrAnswerWrap').style.display = isEssay ? 'block' : 'none';
    // Populate fields
    document.getElementById('corrModalMeta').innerHTML = '<span>' + item.category + '</span>';
    document.getElementById('corrText').value = current.text || current.question || current.point || '';
    document.getElementById('corrBlanks').value = (current.blanks || []).join(', ');
    document.getElementById('corrAnswer').value = current.answer || '';
    document.getElementById('corrModal').classList.add('show');
  };
  window.closeCorrModal = function() {
    document.getElementById('corrModal').classList.remove('show');
  };
  window.saveCorrection = function() {
    var id = state.corrId;
    if (!id) return;
    var patch = {};
    var text = document.getElementById('corrText').value.trim();
    if (state.corrType === 'fill') {
      patch.text = text;
      var blanks = document.getElementById('corrBlanks').value.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
      patch.blanks = blanks;
    } else if (state.corrType === 'essay') {
      patch.question = text;
      patch.answer = document.getElementById('corrAnswer').value.trim();
    } else {
      patch.point = text;
    }
    setCorrection(id, patch);
    showToast('已保存修改');
    closeCorrModal();
    // Re-render
    renderFillList();
    renderEssayList();
    renderSprintList(true);
  };
  window.resetCardCorrection = function(id, event) {
    if (event) event.stopPropagation();
    resetCorrection(id);
    showToast('已恢复原始版本');
    renderFillList();
    renderEssayList();
    renderSprintList(true);
  };

  function updateStats() {
    var fillDone = 0;
    APP_DATA.fillBlanks.forEach(function(item) {
      var revealed = state.fillRevealed[item.id];
      if (revealed && item.blanks.every(function(_, i) { return revealed.has(i); })) fillDone++;
    });
    document.getElementById('statFill').textContent = fillDone;
    document.getElementById('statEssay').textContent = APP_DATA.essayQuestions.length;
    var mastered = Object.keys(state.sprintMastered).length;
    document.getElementById('statKey').textContent = mastered;
  }

  function renderAll() {
    renderFillList();
    renderEssayList();
    renderSprintList();
  }

  // ===== START =====
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
